<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice To-Do List</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f3f0ff;
        color: #2d3748;
        min-height: 100vh;
        padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 24px; }
    header .emojis { font-size: 2rem; margin-bottom: 8px; }
    header h1 { color: #6b46c1; font-size: 1.8rem; margin-bottom: 4px; }
    header p { color: #718096; font-size: 0.95rem; }
    .card {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(107, 70, 193, 0.1);
    }
    .input-row {
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .mic-btn {
        width: 48px; height: 48px;
        border-radius: 50%;
        border: none;
        background: #6b46c1;
        color: #fff;
        font-size: 1.3rem;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.2s, box-shadow 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .mic-btn:hover { background: #553c9a; }
    .mic-btn.listening {
        background: #e53e3e;
        animation: pulse 1.2s infinite;
    }
    .mic-btn.unavailable {
        background: #a0aec0;
        cursor: not-allowed;
    }
    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.5); }
        50% { box-shadow: 0 0 0 12px rgba(229, 62, 62, 0); }
    }
    .text-input {
        flex: 1;
        padding: 12px 14px;
        border: 2px solid #e2d6f8;
        border-radius: 8px;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
    }
    .text-input:focus { border-color: #6b46c1; }
    .add-btn {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        background: #6b46c1;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.2s;
    }
    .add-btn:hover { background: #553c9a; }
    .voice-status {
        margin-top: 10px;
        font-size: 0.85rem;
        color: #718096;
        min-height: 1.2em;
    }
    .voice-status.error { color: #e53e3e; }
    .voice-status.success { color: #38a169; }
    .list-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
    }
    .list-header h2 { color: #6b46c1; font-size: 1.15rem; }
    .count-badge {
        background: #e9d8fd;
        color: #6b46c1;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 600;
    }
    .empty-state {
        text-align: center;
        padding: 32px 16px;
        color: #a0aec0;
        font-size: 0.95rem;
    }
    .todo-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: background 0.15s;
        user-select: none;
    }
    .todo-item:hover { background: #f7f4ff; }
    .todo-item .status-icon {
        width: 28px; height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        flex-shrink: 0;
    }
    .todo-item.active .status-icon {
        border: 2px solid #6b46c1;
        color: #6b46c1;
    }
    .todo-item.done .status-icon {
        background: #c6f6d5;
        color: #38a169;
        border: 2px solid #38a169;
    }
    .todo-item.waiting .status-icon {
        background: #fefcbf;
        color: #d69e2e;
        border: 2px solid #d69e2e;
    }
    .todo-item .item-text { flex: 1; font-size: 1rem; line-height: 1.4; }
    .todo-item.done .item-text {
        text-decoration: line-through;
        color: #a0aec0;
    }
    .todo-item.waiting {
        background: #fffff0;
    }
    .todo-item.waiting .item-text { color: #975a16; }
    .delete-btn {
        width: 28px; height: 28px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: #cbd5e0;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.15s, color 0.15s;
    }
    .delete-btn:hover { background: #fed7d7; color: #e53e3e; }
    .clear-all-btn {
        padding: 6px 14px;
        border: 1px solid #e53e3e;
        border-radius: 8px;
        background: transparent;
        color: #e53e3e;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
    }
    .clear-all-btn:hover { background: #e53e3e; color: #fff; }
    .hints {
        text-align: center;
        color: #a0aec0;
        font-size: 0.8rem;
        margin-top: 8px;
    }
</style>
</head>
<body>
<div class="container">
    <header>
        <div class="emojis">🎙️ 📝 ✅ 🗣️</div>
        <h1>Voice To-Do List</h1>
        <p>Add and manage tasks with your voice or keyboard</p>
    </header>

    <div class="card">
        <div class="input-row">
            <button class="mic-btn" id="micBtn" title="Toggle voice input">🎤</button>
            <input type="text" class="text-input" id="textInput" placeholder="Type a to-do item..." />
            <button class="add-btn" id="addBtn">Add</button>
        </div>
        <div class="voice-status" id="voiceStatus"></div>
    </div>

    <div class="card">
        <div class="list-header">
            <h2>To-Do Items</h2>
            <div style="display:flex;gap:8px;align-items:center;">
                <button class="clear-all-btn" id="clearAllBtn">Clear All</button>
                <span class="count-badge" id="countBadge">0</span>
            </div>
        </div>
        <div id="todoList"></div>
    </div>

    <p class="hints">
        🎤 Say an item to add it &bull; Say "delete [item]" to remove &bull; Tap items to cycle status
    </p>
</div>

<script>
const STORAGE_KEY = 'vt_items';
const STATUS_CYCLE = ['active', 'done', 'waiting'];
const STATUS_ICONS = { active: '○', done: '✓', waiting: '⏳' };

function getItems() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
}

function saveItems(items) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function addItem(text) {
    text = text.trim();
    if (!text) return;
    const items = getItems();
    items.push({ id: Date.now(), text, status: 'active', createdAt: new Date().toISOString() });
    saveItems(items);
    render();
}

function deleteItem(id) {
    const items = getItems().filter(i => i.id !== id);
    saveItems(items);
    render();
}

function cycleStatus(id) {
    const items = getItems();
    const item = items.find(i => i.id === id);
    if (!item) return;
    const idx = STATUS_CYCLE.indexOf(item.status);
    item.status = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
    saveItems(items);
    render();
}

function render() {
    const items = getItems();
    const list = document.getElementById('todoList');
    const badge = document.getElementById('countBadge');
    const activeCount = items.filter(i => i.status !== 'done').length;
    badge.textContent = activeCount;

    if (items.length === 0) {
        list.innerHTML = '<div class="empty-state">No items yet — add one by voice or typing!</div>';
        return;
    }

    const order = { waiting: 0, active: 1, done: 2 };
    const sorted = [...items].sort((a, b) => {
        const d = order[a.status] - order[b.status];
        return d !== 0 ? d : a.id - b.id;
    });

    list.innerHTML = sorted.map(item => `
        <div class="todo-item ${item.status}" data-id="${item.id}">
            <div class="status-icon">${STATUS_ICONS[item.status]}</div>
            <div class="item-text">${escapeHtml(item.text)}</div>
            <button class="delete-btn" data-delete="${item.id}" title="Delete">×</button>
        </div>
    `).join('');
}

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

// Fuzzy match for voice delete
function findBestMatch(spoken, items) {
    const norm = s => s.toLowerCase().trim();
    const target = norm(spoken);
    if (!target) return null;

    let best = null;
    let bestScore = Infinity;

    for (const item of items) {
        const text = norm(item.text);
        if (text === target) return item;
        if (text.includes(target) || target.includes(text)) {
            const score = Math.abs(text.length - target.length);
            if (score < bestScore) { bestScore = score; best = item; }
        }
    }

    if (best) return best;

    // Levenshtein fallback
    for (const item of items) {
        const score = levenshtein(norm(item.text), target);
        const threshold = Math.max(target.length, norm(item.text).length) * 0.5;
        if (score < threshold && score < bestScore) { bestScore = score; best = item; }
    }
    return best;
}

function levenshtein(a, b) {
    const m = a.length, n = b.length;
    const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
    for (let i = 0; i <= m; i++) dp[i][0] = i;
    for (let j = 0; j <= n; j++) dp[0][j] = j;
    for (let i = 1; i <= m; i++)
        for (let j = 1; j <= n; j++)
            dp[i][j] = a[i-1] === b[j-1]
                ? dp[i-1][j-1]
                : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
}

// Voice setup
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('micBtn');
const voiceStatus = document.getElementById('voiceStatus');
let recognition = null;
let listening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        listening = true;
        micBtn.classList.add('listening');
        setStatus('Listening...', '');
    };

    recognition.onend = () => {
        listening = false;
        micBtn.classList.remove('listening');
        if (voiceStatus.textContent === 'Listening...') setStatus('', '');
    };

    recognition.onerror = (e) => {
        listening = false;
        micBtn.classList.remove('listening');
        if (e.error !== 'no-speech' && e.error !== 'aborted') {
            setStatus('Voice error: ' + e.error, 'error');
        } else {
            setStatus('', '');
        }
    };

    recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript.trim();
        handleVoiceCommand(transcript);
    };

    micBtn.addEventListener('click', () => {
        if (listening) { recognition.abort(); }
        else { recognition.start(); }
    });
} else {
    micBtn.classList.add('unavailable');
    micBtn.title = 'Speech recognition not supported in this browser';
    setStatus('Voice input not available — use the text field instead', '');
}

function setStatus(msg, cls) {
    voiceStatus.textContent = msg;
    voiceStatus.className = 'voice-status' + (cls ? ' ' + cls : '');
}

function handleVoiceCommand(transcript) {
    const lower = transcript.toLowerCase();
    if (lower.startsWith('delete ')) {
        const query = transcript.slice(7).trim();
        const items = getItems();
        const match = findBestMatch(query, items);
        if (match) {
            deleteItem(match.id);
            setStatus(`Deleted: "${match.text}"`, 'success');
        } else {
            setStatus(`No match found for "${query}"`, 'error');
        }
    } else {
        addItem(transcript);
        setStatus(`Added: "${transcript}"`, 'success');
    }
    setTimeout(() => setStatus('', ''), 3000);
}

// Manual input
const textInput = document.getElementById('textInput');
const addBtn = document.getElementById('addBtn');

function handleManualAdd() {
    const text = textInput.value.trim();
    if (text) { addItem(text); textInput.value = ''; }
}

addBtn.addEventListener('click', handleManualAdd);
textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleManualAdd();
});

// Clear all
document.getElementById('clearAllBtn').addEventListener('click', () => {
    if (getItems().length === 0) return;
    if (confirm('Delete all items?')) {
        saveItems([]);
        render();
    }
});

// List click delegation
document.getElementById('todoList').addEventListener('click', (e) => {
    const delBtn = e.target.closest('[data-delete]');
    if (delBtn) {
        e.stopPropagation();
        deleteItem(Number(delBtn.dataset.delete));
        return;
    }
    const item = e.target.closest('.todo-item');
    if (item) cycleStatus(Number(item.dataset.id));
});

// Initial render
render();
</script>
</body>
</html>
